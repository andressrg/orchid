services:
  db:
    image: postgres:16
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    environment:
      POSTGRES_USER: orchid
      POSTGRES_PASSWORD: orchid
      POSTGRES_DB: ${POSTGRES_DB:-orchid}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U orchid -d ${POSTGRES_DB:-orchid}"]
      interval: 2s
      timeout: 2s
      retries: 20
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
