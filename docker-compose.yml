services:
  server:
    build:
      context: .
      dockerfile: server/Dockerfile
      target: dev
    ports:
      - "3000:3000"
    volumes:
      - ./server/src:/workspace/server/src
      - ./server/migrations:/workspace/server/migrations
    environment:
      PORT: "3000"
      DATABASE_URL: postgresql://orchid:orchid@postgres:5432/orchid
      API_KEY: dev-api-key
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: orchid
      POSTGRES_PASSWORD: orchid
      POSTGRES_DB: orchid
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U orchid"]
      interval: 2s
      timeout: 5s
      retries: 10

volumes:
  pgdata:
